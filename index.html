<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4-Digit PIN Generator</title>
<style>
body{
    font-family:Arial,sans-serif;
    text-align:center;
    margin-top:100px;
}
#pin{
    font-size:40px;
    margin:20px;
}
button{
    padding:10px 20px;
    font-size:18px;
}
</style>
</head>
<body>

<h1>4-Digit PIN Generator</h1>

<div id="pin">----</div>

<button onclick="generatePin()">Generate PIN</button>

<script>
function generatePin() {
    const pin = Math.floor(1000 + Math.random() * 9000);
    document.getElementById("pin").textContent = pin;
}
</script>

</body>
</html>
